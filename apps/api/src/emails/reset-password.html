<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reset Your Password</title>
  <style>
    body {
      background-color: #080B14;
      color: #FFFFFF;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      width: 100%;
      background-color: #080B14;
      padding: 40px 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #0F1322;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid #1E2640;
    }
    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo {
      display: inline-block;
      width: 60px;
      height: 60px;
      line-height: 60px;
      border-radius: 50%;
      background-color: #FFA502;
      color: #FFFFFF;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      color: #FFFFFF;
    }
    p {
      color: #A0AEC0;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
      text-align: center;
    }
    .otp-container {
      text-align: center;
      margin: 30px 0;
    }
    .otp-box {
      display: inline-block;
      letter-spacing: 8px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 36px;
      font-weight: bold;
      padding: 16px 28px;
      background-color: #161B30;
      border: 2px solid #FFA502;
      border-radius: 8px;
      color: #FFA502;
    }
    .warning {
      color: #FF7F50;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 30px;
    }
    .footer {
      text-align: center;
      border-top: 1px solid #1E2640;
      padding-top: 20px;
      font-size: 11px;
      color: #718096;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="logo-container">
        <div class="logo">🔑</div>
      </div>
      <h1>SubTrackr Password Reset</h1>
      <p>Use the 6-digit verification recovery code below to securely reset your password:</p>
      
      <div class="otp-container">
        <div class="otp-box">{{otp_code}}</div>
      </div>

      <div class="warning">⚠️ This code expires in 10 minutes</div>

      <div class="footer">
        <p>If you didn't request this password reset trigger session, please securely ignore this automated email.</p>
      </div>
    </div>
  </div>
</body>
</html>
